    const container = document.getElementById("movieContainer");
    container.innerHTML = "";


    function getMovieByGenre(genre) {
      container.innerHTML = ""; 

      let result = []
      for (const element of movies) {
        if (element['genre'] === genre) {
          result.push(element)
        }
      }


      result.forEach(movie => {
        container.innerHTML += `
            <div class="col-md-2">
              <div class="card">
                <img src="${movie.image}" class="card-img-top">
                <div class="card-body text-center">
                  ${movie.title}
                </div>
              </div>
           </div>
      `;
      })

      container.appendChild(container);
    }



    function showGenre(genre) {

      container.innerHTML += ``;

      let data = [];

      if (genre === "semua") {
        data = Object.values(movies).flat();
      } else {
        data = movies[genre];
      }
      // console.log(data);


      data.forEach(movie => {
        container.innerHTML += `
      <div class="col-md-2">
        <div class="card">
          <img src="${movie.image}" class="card-img-top">
          <div class="card-body text-center">
            ${movie.title}
          </div>
        </div>
      </div>
    `;
      });
    }
