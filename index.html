<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Bandar Movies</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
</head>

<body>

    <header class="position-relative">
        <nav class="navbar navbar-expand">
            <nav class="navbar navbar-expand px-4">

                <!-- Tulisan Navbar -->
                <a class="navbar-brand fw-bold" href="/index.html">
                    BANDAR MOVIES
                </a>

            </nav>
            <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">

                <a href="login.html" id="authBtn" class="red-btn fw-semibold">
                    Sign In
                </a>

            </div>
        </nav>

        <!-- Genre Film -->

        <section class="container mt-5 text-center">

            <h2 class="text-white mb-4">Genre Film</h2>

            <div class="d-flex justify-content-center gap-3 flex-wrap">

                <button class="btn btn-dark" onclick="getMovieByGenre()">Semua</button>

                <button class="btn btn-dark" onclick="getMovieByGenre('action')">Action</button>

                <button class="btn btn-dark" onclick="getMovieByGenre('comedy')">Comedy</button>

                <button class="btn btn-dark" onclick="getMovieByGenre('horror')">Horror</button>

                <button class="btn btn-dark" onclick="getMovieByGenre('romance')">Romance</button>

                <button class="btn btn-dark" onclick="getMovieByGenre('sci-fi')">Sci-Fi</button>

            </div>
        </section>

        <!-- Film -->

        <section class="container mt-5">
            <div id="movieContainer" class="row g-4 justify-content-center"></div>
        </section>


    </header>

    <!-- Trigger Button --> <button type="button" id="myTriggerBtn" class="btn btn-primary" data-bs-toggle="modal"
        data-bs-target="#myModal" style="display: none;"> </button>



    <!-- Modal with Fade -->
    <div class="modal fade" id="myModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen"> <!-- Full screen option -->
            <div class="modal-content" style="background-color: transparent !important;">
                <div class="modal-body" style=" z-index: 9999;">
                    <h1 class="netflix-logo" style="size: 10px;">Bandar Movies</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- script -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

        </script>
