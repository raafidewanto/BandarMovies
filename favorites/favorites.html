<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Favorite Movies</title>
    <!-- bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="favoritesCSS.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="site-header">
      <div class="container">
        <div
          class="d-flex align-items-center justify-content-between flex-wrap gap-3"
        >
          <div>
            <div class="brand">O Bros</div>
            <div class="judul">My Favorite Movies</div>
          </div>
          <div class="header-stats">
            <div class="site-item">
              <div class="num" id="stat-total">0</div>
              <div class="label">Movies</div>
            </div>
            <div class="site-item">
              <div class="num" id="stat-genres">0</div>
              <div class="label">Genres</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="container">
        <div
          class="d-flex align-items-center justify-content-between flex-wrap gap-3"
        >
          <!-- genre pills -->
          <div class="genre-pills" id="genrePills"></div>
          <!-- sorting -->
          <select class="sort-select" id="sortSelect">
            <option value="title">Judul A-Z</option>
            <option value="year-desc">Terbaru</option>
            <option value="year-asc">Terlama</option>
            <option value="rating-desc">Rating Tertinggi</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Main -->
    <main class="container">
      <div id="genreContainer"></div>
      <div id="emptyState" class="empty-state section-hidden">
        <div class="empty-icon">🎬</div>
        <h3>Tidak ada film di genre ini</h3>
        <p>Coba pilih genre lain</p>
      </div>
      <div class="footer-pad"></div>
    </main>

    <!-- toast -->
    <div class="toast-wrap" id="toastWrap"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="favoritesJS.js"></script>
  </body>
</html>
